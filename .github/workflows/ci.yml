name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Package unpacked application
        run: pnpm package

      - name: Electron E2E (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm e2e

      - name: Electron E2E
        if: runner.os != 'Linux'
        run: pnpm e2e

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: diagnostics-${{ matrix.os }}
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7
