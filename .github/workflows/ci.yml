name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Forge 7's transitive @electron/node-gyp cannot yet detect Visual
        # Studio 2026 on windows-latest. Keep native-module builds on VS 2022.
        os: [ubuntu-latest, windows-2022, macos-15]

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release and upgrade identity
        run: pnpm verify:release

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Package unpacked application
        env:
          # The arm64 macOS runner gives Node a ~2 GB default heap, which is
          # too small for the Monaco/PDF.js production bundle and sourcemaps.
          NODE_OPTIONS: --max-old-space-size=4096
        run: pnpm package

      - name: Electron E2E (Linux)
        if: runner.os == 'Linux'
        env:
          # Unpacked CI artifacts cannot retain Electron's root:4755 SUID
          # helper. Scope the fallback to the native-module smoke child only.
          RESEARCH_IDE_E2E_NO_SANDBOX: '1'
        run: xvfb-run --auto-servernum pnpm e2e

      - name: Electron E2E
        if: runner.os != 'Linux'
        run: pnpm e2e

      - name: Upload test diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: diagnostics-${{ matrix.os }}
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore
          retention-days: 7
